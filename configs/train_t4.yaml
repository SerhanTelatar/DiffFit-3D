# ============================================================================
# DiffFit-3D Training Configuration — T4/16GB VRAM Optimized
# ============================================================================

# --- General ---
project_name: "difffit-3d"
experiment_name: "t4_lightweight"
seed: 42
output_dir: "outputs"
log_dir: "logs"

# --- Model ---
model:
  person_unet: "configs/model/person_unet_light.yaml"
  garment_unet: "configs/model/garment_unet_light.yaml"
  vae: "configs/model/vae.yaml"
  pretrained_sd: null         # No pretrained SD (lightweight model)
  pretrained_clip: null       # Use built-in encoder

# --- Data ---
data:
  config: "configs/data/dataset.yaml"
  batch_size: 1
  num_workers: 2
  pin_memory: true
  persistent_workers: true

# --- Training ---
training:
  epochs: 50
  gradient_accumulation_steps: 16  # effective batch = 16
  mixed_precision: "fp16"
  gradient_checkpointing: true
  max_grad_norm: 1.0

  # Optimizer
  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8

  # LR Scheduler
  lr_scheduler:
    type: "cosine_with_warmup"
    warmup_steps: 500
    min_lr: 1.0e-6

  # EMA
  ema:
    enabled: false             # Disable EMA to save memory

  # Checkpointing
  checkpoint:
    save_every_n_epochs: 5
    save_every_n_steps: 2000
    keep_last_n: 3
    save_dir: "checkpoints/runs"

  # Logging
  logging:
    log_every_n_steps: 50
    sample_every_n_steps: 500
    use_wandb: false

# --- Loss Weights ---
losses:
  l1_weight: 1.0
  perceptual_weight: 0.5
  lpips_weight: 1.0
  adversarial_weight: 0.0     # Disable adversarial (saves memory)
  kl_weight: 0.0001

# --- Noise Scheduler ---
noise_scheduler:
  type: "ddpm"
  num_train_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  beta_schedule: "scaled_linear"
  prediction_type: "epsilon"
  clip_sample: false

# --- Hardware ---
hardware:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
