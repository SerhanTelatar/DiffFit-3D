# ============================================================================
# Garment UNet — Lightweight (T4/16GB VRAM)
# ============================================================================

model_type: "garment_unet"

# --- Architecture (halved channels) ---
in_channels: 4
out_channels: 4
model_channels: 128         # 320 → 128
attention_resolutions: [4, 2]
num_res_blocks: 1           # 2 → 1
channel_mult: [1, 2, 4]     # 4 levels → 3 levels
num_heads: 4
num_head_channels: 32
use_spatial_transformer: true
transformer_depth: 1
context_dim: 512

# --- Garment Conditioning ---
garment_encoder:
  type: "clip"
  model_name: "openai/clip-vit-base-patch32"  # Large → Base (much smaller)
  feature_dims: [128, 256, 512, 512]
  multi_scale: true
  freeze_encoder: true

# --- Warping Module ---
warping:
  enabled: true
  type: "tps"
  num_control_points: 10
  regularization_weight: 0.01

# --- Cross-Attention to Person Branch ---
cross_attention:
  enabled: true
  dim: 512
  heads: 4
  fusion_type: "concat_proj"

# --- Regularization ---
dropout: 0.0
use_checkpoint: true
