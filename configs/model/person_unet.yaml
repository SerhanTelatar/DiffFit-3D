# ============================================================================
# Person UNet Configuration
# ============================================================================

model_type: "person_unet"

# --- Architecture ---
in_channels: 9              # 4 (latent) + 3 (agnostic) + 1 (pose) + 1 (DensePose)
out_channels: 4             # Latent space channels
model_channels: 320
attention_resolutions: [4, 2, 1]
num_res_blocks: 2
channel_mult: [1, 2, 4, 4]
num_heads: 8
num_head_channels: 64
use_spatial_transformer: true
transformer_depth: 1
context_dim: 768            # CLIP text embedding dim

# --- ControlNet-style conditioning ---
controlnet:
  enabled: true
  conditioning_channels: 5   # 3 (pose RGB) + 1 (segmentation) + 1 (DensePose IUV)
  conditioning_embedding_channels: [16, 32, 96, 256]
  zero_init: true

# --- Attention ---
attention:
  use_flash_attention: true
  use_xformers: true
  cross_attention_dim: 768

# --- Regularization ---
dropout: 0.0
use_checkpoint: true        # Gradient checkpointing
