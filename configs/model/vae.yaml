# ============================================================================
# VAE (Variational Autoencoder) Configuration
# ============================================================================

model_type: "vae"

# --- Architecture ---
in_channels: 3
out_channels: 3
latent_channels: 4
down_block_types:
  - "DownEncoderBlock2D"
  - "DownEncoderBlock2D"
  - "DownEncoderBlock2D"
  - "DownEncoderBlock2D"
up_block_types:
  - "UpDecoderBlock2D"
  - "UpDecoderBlock2D"
  - "UpDecoderBlock2D"
  - "UpDecoderBlock2D"
block_out_channels: [128, 256, 512, 512]
layers_per_block: 2
norm_num_groups: 32
act_fn: "silu"

# --- Scaling ---
scaling_factor: 0.18215      # SD 1.5 default

# --- Pretrained ---
pretrained: "stabilityai/sd-vae-ft-mse"
freeze: true                 # Freeze VAE during training
