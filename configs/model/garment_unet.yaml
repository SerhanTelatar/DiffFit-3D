# ============================================================================
# Garment UNet Configuration
# ============================================================================

model_type: "garment_unet"

# --- Architecture ---
in_channels: 4              # Latent space channels (garment encoded)
out_channels: 4
model_channels: 320
attention_resolutions: [4, 2, 1]
num_res_blocks: 2
channel_mult: [1, 2, 4, 4]
num_heads: 8
num_head_channels: 64
use_spatial_transformer: true
transformer_depth: 1
context_dim: 768

# --- Garment Conditioning ---
garment_encoder:
  type: "clip"               # clip, dinov2
  model_name: "openai/clip-vit-large-patch14"
  feature_dims: [256, 512, 1024, 1024]
  multi_scale: true
  freeze_encoder: true

# --- Warping Module ---
warping:
  enabled: true
  type: "tps"                # tps, flow
  num_control_points: 10
  regularization_weight: 0.01

# --- Cross-Attention to Person Branch ---
cross_attention:
  enabled: true
  dim: 768
  heads: 8
  fusion_type: "concat_proj"  # concat_proj, add, gated

# --- Regularization ---
dropout: 0.0
use_checkpoint: true
