# ============================================================================
# Person UNet — Lightweight (T4/16GB VRAM)
# ============================================================================

model_type: "person_unet"

# --- Architecture (halved channels) ---
in_channels: 9              # 4 (latent) + 3 (agnostic) + 1 (pose) + 1 (DensePose)
out_channels: 4
model_channels: 128         # 320 → 128 (60% smaller)
attention_resolutions: [4, 2]
num_res_blocks: 1           # 2 → 1
channel_mult: [1, 2, 4]     # 4 levels → 3 levels
num_heads: 4                # 8 → 4
num_head_channels: 32       # 64 → 32
use_spatial_transformer: true
transformer_depth: 1
context_dim: 512            # 768 → 512

# --- ControlNet-style conditioning ---
controlnet:
  enabled: true
  conditioning_channels: 5
  conditioning_embedding_channels: [16, 32, 64, 128]
  zero_init: true

# --- Attention ---
attention:
  use_flash_attention: true
  use_xformers: true
  cross_attention_dim: 512

# --- Regularization ---
dropout: 0.0
use_checkpoint: true
