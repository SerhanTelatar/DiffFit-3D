# ============================================================================
# DiffFit-3D Inference Configuration
# ============================================================================

# --- Model Paths ---
model:
  person_unet_path: "checkpoints/person_unet/best.safetensors"
  garment_unet_path: "checkpoints/garment_unet/best.safetensors"
  vae_path: "checkpoints/vae/best.safetensors"
  person_unet_config: "configs/model/person_unet.yaml"
  garment_unet_config: "configs/model/garment_unet.yaml"
  vae_config: "configs/model/vae.yaml"
  pretrained_sd: "checkpoints/pretrained/stable_diffusion_v1.5"
  use_ema: true

# --- Diffusion Sampling ---
sampling:
  scheduler: "ddim"            # ddpm, ddim, pndm, euler
  num_inference_steps: 50
  guidance_scale: 7.5
  eta: 0.0                     # DDIM eta (0 = deterministic)
  seed: null                   # null for random

# --- Image Settings ---
image:
  resolution: 512
  aspect_ratio: "3:4"          # or "1:1", "auto"
  output_format: "png"

# --- Video Settings ---
video:
  enabled: false
  num_frames: 24
  fps: 8
  temporal_guidance_scale: 2.0
  output_format: "mp4"
  codec: "libx264"

# --- Post-Processing ---
postprocess:
  face_restore: true
  face_restore_model: "codeformer"  # gfpgan, codeformer
  edge_smooth: true
  edge_smooth_kernel: 5
  color_correction: true
  watermark: true               # SynthID watermark

# --- Hardware ---
device: "cuda"
dtype: "float16"               # float16, bfloat16, float32
enable_xformers: true

# --- Output ---
output_dir: "results"
save_intermediate: false       # Save denoising steps
