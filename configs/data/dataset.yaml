# ============================================================================
# Dataset Configuration — Full 3D Pipeline
# ============================================================================

# --- Paths ---
data_root: "data"
raw_dir: "data/raw"
processed_dir: "data/processed"
pairs_file: "data/raw/pairs.csv"

# --- Splits ---
train_pairs: "data/raw/train_pairs.csv"
val_pairs: "data/raw/val_pairs.csv"
test_pairs: "data/raw/test_pairs.csv"
val_ratio: 0.05
test_ratio: 0.05

# --- Image ---
image:
  resolution: 512
  person_size: [512, 384]     # H x W (3:4 aspect)
  garment_size: [512, 384]
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std: [0.5, 0.5, 0.5]

# --- 3D Garment Assets ---
garments_3d:
  root_dir: "data/garments_3d"               # 3D giysi mesh dosyaları
  supported_formats: [".obj", ".glb", ".ply", ".off"]
  texture_resolution: 1024
  categories:
    - upper_body        # T-shirt, gömlek, ceket
    - lower_body        # Pantolon, etek
    - dresses           # Elbiseler
    - outerwear         # Mont, kaban

# --- SMPL-X Body Models ---
smplx:
  model_dir: "checkpoints/pretrained/smplx"   # SMPL-X model dosyaları
  gender: "neutral"                            # neutral, male, female
  body_params_dir: "data/processed/smplx_params"  # Kişi başına beden parametreleri
  num_betas: 10
  use_face_contour: true

# --- 3D Render Outputs ---
renders_3d:
  output_dir: "data/processed/renders_3d"     # Render edilmiş giysi görüntüleri
  normal_maps_dir: "data/processed/normal_maps"
  depth_maps_dir: "data/processed/depth_maps"
  render_resolution: 512
  num_views: 1                                 # Kaç açıdan render (1=ön, 4=çok açılı)

# --- Augmentation ---
augmentation:
  enabled: true
  horizontal_flip: 0.5
  color_jitter:
    enabled: true
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.05
  random_affine:
    enabled: true
    degrees: 5
    translate: [0.02, 0.02]
    scale: [0.95, 1.05]
  random_erasing:
    enabled: false
    probability: 0.1

# --- 2D Preprocessing Outputs (mevcut) ---
preprocessed:
  poses_dir: "data/processed/poses"
  segments_dir: "data/processed/segments"
  densepose_dir: "data/processed/densepose"
  agnostic_dir: "data/processed/agnostic"

# --- Sampling ---
sampling:
  paired: true                # Same person, same garment (self-supervised)
  cross_person: false         # Different person, same garment
  max_pose_diff: 45           # Max angle difference for pair sampling
