# ============================================================================
# Preprocessing Configuration — Full 3D Pipeline
# ============================================================================

# --- General ---
data_root: "data/raw/images"
output_root: "data/processed"
num_workers: 4
batch_size: 16
device: "cuda"

# --- Pose Estimation ---
pose:
  enabled: true
  model: "dwpose"             # openpose, dwpose, mediapipe
  output_dir: "data/processed/poses"
  output_format: "json"       # json, npy
  render_pose: true
  render_dir: "data/processed/poses/rendered"
  confidence_threshold: 0.3
  body_keypoints: 18
  hand_keypoints: 21
  face_keypoints: 70

# --- Human Segmentation ---
segmentation:
  enabled: true
  model: "atr"                # atr, lip, sam
  output_dir: "data/processed/segments"
  num_classes: 18
  output_format: "png"
  save_visualization: true

# --- DensePose ---
densepose:
  enabled: true
  model: "densepose_rcnn_R_50_FPN_s1x"
  output_dir: "data/processed/densepose"
  output_format: "npy"
  save_visualization: true
  confidence_threshold: 0.5

# --- Agnostic Mask ---
agnostic:
  enabled: true
  output_dir: "data/processed/agnostic"
  mask_type: "upper"
  dilate_kernel: 15
  preserve_regions:
    - "face"
    - "hair"
    - "hands"
    - "lower_body"

# ============================================================================
# 3D Pipeline — Yeni Ön-İşleme Adımları
# ============================================================================

# --- SMPL-X Body Estimation ---
smplx:
  enabled: true
  model_dir: "checkpoints/pretrained/smplx"
  regressor: "pymaf"          # pymaf, expose, pixie
  gender: "neutral"
  output_dir: "data/processed/smplx_params"
  save_mesh: true             # .obj mesh dosyalarını da kaydet
  mesh_dir: "data/processed/smplx_meshes"
  num_betas: 10

# --- 3D Garment Rendering ---
garment_render:
  enabled: true
  garments_dir: "data/garments_3d"
  output_dir: "data/processed/renders_3d"
  normal_maps_dir: "data/processed/normal_maps"
  depth_maps_dir: "data/processed/depth_maps"
  render_resolution: 512
  shader: "phong"             # phong, flat, silhouette
  num_views: 1                # 1=ön, 4=çok açılı
  camera:
    dist: 2.7
    elev: 0
    azim: 0
  background_color: [1.0, 1.0, 1.0]   # Beyaz arka plan
